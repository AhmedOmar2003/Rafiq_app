name: Build APK

# Auto-builds a release APK on every push to main and commits it to
# `web/app-release.apk`, which Vercel serves at:
#   https://rafiq-master-zeta.vercel.app/app-release.apk
#
# Vercel re-deploys whenever main changes, so the URL always points at
# the latest build — no manual upload required.

on:
  push:
    branches: [main]
    paths-ignore:
      - "web/app-release.apk"
      - "admin-dashboard-rafiq-app/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the auto-commit doesn't fail to push.
          fetch-depth: 0
          # Use a token that can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK into web/ (Vercel public root)
        run: |
          mkdir -p web
          cp build/app/outputs/flutter-apk/app-release.apk web/app-release.apk
          ls -lh web/app-release.apk

      - name: Commit & push the rebuilt APK
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/app-release.apk
          # `--allow-empty` keeps the workflow green even if the binary is
          # identical (rare, but possible for no-op pushes).
          if git diff --cached --quiet; then
            echo "APK unchanged — skipping commit."
            exit 0
          fi
          git commit -m "ci: rebuild app-release.apk [skip ci]"
          git push origin HEAD:main
