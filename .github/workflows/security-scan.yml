name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact --no-git -v

  npm-audit:
    name: Dashboard dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: admin-dashboard-rafiq-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci --ignore-scripts

      - name: Audit
        run: npm audit --audit-level=high
