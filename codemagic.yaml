workflows:
  ios-testflight:
    name: Rafiq iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ahmedomar2003.rafiq
      vars:
        BUNDLE_ID: com.ahmedomar2003.rafiq
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Set Xcode project code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS ipa
        script: |
          flutter build ipa --release --build-name=1.0.${BUILD_NUMBER} --build-number=${BUILD_NUMBER}
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
