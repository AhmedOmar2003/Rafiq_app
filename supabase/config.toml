# Supabase CLI config — Rafiq
# https://supabase.com/docs/guides/cli/config
#
# This file is checked into VCS. Secrets stay in `supabase/.env.local` (ignored).

project_id = "rafiq"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url      = "https://rafiq-master-zeta.vercel.app/app/"
additional_redirect_urls = [
  "rafiqapp://reset-password",
  "rafiqapp://oauth-callback",
  "https://rafiq-master-zeta.vercel.app/app/*",
]
jwt_expiry            = 3600        # 1 hour access token
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup         = true
double_confirm_changes = true
enable_confirmations  = false               # Production currently signs users in immediately
secure_password_change = true

[auth.email.template.confirmation]
subject = "كود تأكيد رفيق"
content_path = "supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "كود تغيير كلمة السر — رفيق"
content_path = "supabase/templates/recovery.html"

[auth.external.google]
enabled    = true
client_id  = "env(GOOGLE_CLIENT_ID)"
secret     = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "https://qtlmumlcvcwqieexcguy.supabase.co/auth/v1/callback"

[edge_runtime]
enabled = true
policy  = "oneshot"
inspector_port = 8083
