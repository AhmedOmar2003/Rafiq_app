<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <title>كود تغيير كلمة السر — رفيق</title>
  </head>
  <body style="font-family: 'Rubik', Arial, sans-serif; background:#F7F3DA; padding:32px;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0"
           width="100%" style="max-width:480px; margin:0 auto;
           background:#FFFFFF; border-radius:16px; padding:32px; text-align:center;
           box-shadow:0 4px 16px rgba(0,0,0,.06);">
      <tr><td>
        <h1 style="color:#681F00; margin:0 0 12px; font-size:24px;">تغيير كلمة السر</h1>
        <p style="color:#707070; margin:0 0 24px; font-size:15px; line-height:1.6;">
          استخدم الكود التالي لإعادة تعيين كلمة السر الخاصة بك:
        </p>

        <div style="display:inline-block; padding:16px 28px; border-radius:12px;
                    background:#FBEEE9; color:#681F00; font-size:32px;
                    font-weight:700; letter-spacing:8px;">
          {{ .Token }}
        </div>

        <p style="color:#979797; margin:24px 0 0; font-size:13px;">
          الكود صالح لمدة 60 دقيقة. لو ما طلبتش تغيير كلمة السر، تجاهل الرسالة.
        </p>
      </td></tr>
    </table>
  </body>
</html>
